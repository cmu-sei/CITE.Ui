<div mat-dialog-title>
  @if (data.scoringOption.id) {
  <span>Edit Scoring Option</span>
  }
  @if (!data.scoringOption.id) {
  <span>Add Scoring Option</span>
  }
  <button
    mat-icon-button
    (click)="handleEditComplete(false)"
    title="Cancel"
    class="close-button"
    tabindex="-1"
    >
    <mat-icon class="mdi-24px self-center" fontIcon="mdi-close-circle-outline"></mat-icon>
  </button>
</div>
@if (data && data.scoringOption) {
  <div mat-dialog-content>
    <div class="add-margin">
      <div class="field-row">
        <mat-form-field class="description-field full-width">
          <mat-label>Scoring Option Description</mat-label>
          <textarea matInput [(ngModel)]="data.scoringOption.description"></textarea>
        </mat-form-field>
        <button mat-icon-button type="button" class="info-button" tabindex="-1"
          matTooltip="A name or description of this scoring option as it appears to participants on the scoresheet."
          #descTip="matTooltip" (click)="descTip.toggle()">
          <mat-icon class="mdi-20px" fontIcon="mdi-information-outline"></mat-icon>
        </button>
      </div>
    </div>
    <div class="add-margin">
      <div class="field-row">
        <mat-form-field class="description-field">
          <mat-label>Display Order</mat-label>
          <input matInput [(ngModel)]="data.scoringOption.displayOrder" />
        </mat-form-field>
        <button mat-icon-button type="button" class="info-button" tabindex="-1"
          matTooltip="Numeric order in which this option appears within its category. Lower numbers appear first."
          #orderTip="matTooltip" (click)="orderTip.toggle()">
          <mat-icon class="mdi-20px" fontIcon="mdi-information-outline"></mat-icon>
        </button>
      </div>
    </div>
    <div class="add-margin">
      <div class="field-row">
        <mat-form-field class="description-field">
          <mat-label>Value</mat-label>
          <input matInput [(ngModel)]="data.scoringOption.value" />
        </mat-form-field>
        <button mat-icon-button type="button" class="info-button" tabindex="-1"
          matTooltip="Numeric score awarded when this option is selected. Used by the category's calculation equation."
          #valueTip="matTooltip" (click)="valueTip.toggle()">
          <mat-icon class="mdi-20px" fontIcon="mdi-information-outline"></mat-icon>
        </button>
      </div>
    </div>
    <div class="add-margin">
      <div class="field-row">
        <mat-checkbox [(ngModel)]="data.scoringOption.isModifier">Is a Modifier</mat-checkbox>
        <button mat-icon-button type="button" class="info-button" tabindex="-1"
          matTooltip="Marks this option as a modifier rather than a primary scoring option. Modifiers are selected separately and can adjust the category's score via the calculation equation."
          #modTip="matTooltip" (click)="modTip.toggle()">
          <mat-icon class="mdi-20px" fontIcon="mdi-information-outline"></mat-icon>
        </button>
      </div>
    </div>
    <div class="cssLayoutRowStartCenter bottom-button">
      <div class="delete-button">
        <button mat-stroked-button (click)="handleEditComplete(true)" [disabled]="!errorFree()" style="margin-left: 40px;">Save</button>
      </div>
      <div class="delete-button">
        <button mat-stroked-button (click)="handleEditComplete(false)">Cancel</button>
      </div>
    </div>
  </div>
}
